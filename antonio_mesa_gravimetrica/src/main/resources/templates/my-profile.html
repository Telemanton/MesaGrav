<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{profile.title}">Mi Perfil - SmartTable Control</title>
     <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles-profile.css}">
</head>

<body>

    <header class="profile-header">
        <div class="header-container">
            <a th:href="@{/home}" class="btn-back">
                <i class="fas fa-arrow-left"></i> <span th:text="#{btn.back.dashboard}">Volver al Panel</span>
            </a>
            <h1 th:text="#{profile.header}">Gestión de Perfil de Usuario</h1>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-grid">

            <section class="profile-card info-section">
                <div class="card-title-wrap">
                    <i class="fas fa-id-card card-icon"></i>
                    <h2 th:text="#{profile.info.title}">Datos de la Cuenta</h2>
                </div>

                <div class="info-group">
                    <label th:text="#{profile.label.username}">Nombre de Usuario</label>
                    <div class="info-value" th:text="${currentUser.username}">admin_user</div>
                </div>

                <div class="info-group-row">
                    <div class="info-group">
                        <label th:text="#{profile.label.name}">Nombre</label>
                        <div class="info-value" th:text="${currentUser.name}">John</div>
                    </div>
                    <div class="info-group">
                        <label th:text="#{profile.label.surname}">Apellidos</label>
                        <div class="info-value" th:text="${currentUser.surname}">Doe</div>
                    </div>
                </div>

                <div class="info-group">
                    <label th:text="#{profile.label.role}">Rol asignado en Sistema</label>
                    <div class="info-value role-badge" th:text="${currentUser.role}">ROLE_ADMIN</div>
                </div>
            </section>

            <section class="profile-card security-section">
                <div class="card-title-wrap">
                    <i class="fas fa-shield-alt card-icon-sec"></i>
                    <h2 th:text="#{profile.security.title}">Seguridad y Credenciales</h2>
                </div>

                <form th:action="@{/my-profile/update-password}" method="post" id="passwordForm">

                    <div class="input-group">
                        <label for="currentPassword" th:text="#{profile.label.currpass}">Contraseña Actual</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="currentPassword" name="currentPassword" required
                                th:placeholder="#{profile.placeholder.currpass}">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="newPassword" th:text="#{profile.label.newpass}">Nueva Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key input-icon"></i>
                            <input type="password" id="newPassword" name="newPassword" required
                                th:placeholder="#{profile.placeholder.newpass}">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword" th:text="#{profile.label.confpass}">Confirmar Nueva
                            Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fas fa-check-double input-icon"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" required
                                th:placeholder="#{profile.placeholder.confpass}">
                        </div>

                        <span id="passwordError" class="error-msg" style="display: none;">
                            <i class="fas fa-times-circle"></i> <span th:text="#{profile.error.mismatch}">Las
                                contraseñas no coinciden</span>
                        </span>
                    </div>

                    <button type="submit" class="btn-submit" id="btnSavePassword">
                        <i class="fas fa-save"></i> <span th:text="#{btn.update.password}">Actualizar Contraseña</span>
                    </button>
                </form>
            </section>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("passwordForm");
            const newPassword = document.getElementById("newPassword");
            const confirmPassword = document.getElementById("confirmPassword");
            const errorMsg = document.getElementById("passwordError");
            const btnSubmit = document.getElementById("btnSavePassword");

            function validarContrasenas() {
                if (confirmPassword.value.length > 0) {
                    if (newPassword.value !== confirmPassword.value) {
                        errorMsg.style.display = "block";
                        confirmPassword.classList.add("input-error");
                        btnSubmit.disabled = true;
                    } else {
                        errorMsg.style.display = "none";
                        confirmPassword.classList.remove("input-error");
                        btnSubmit.disabled = false;
                    }
                } else {
                    errorMsg.style.display = "none";
                    confirmPassword.classList.remove("input-error");
                    btnSubmit.disabled = false;
                }
            }

            newPassword.addEventListener("input", validarContrasenas);
            confirmPassword.addEventListener("input", validarContrasenas);

            form.addEventListener("submit", function (e) {
                if (newPassword.value !== confirmPassword.value) {
                    e.preventDefault();
                    // Nota: Mantenemos un mensaje genérico o puedes inyectar strings localizados si fuera crítico por JS.
                    alert("Error: Las contraseñas introducidas no son iguales.");
                } else if (newPassword.value.length < 6) {
                    e.preventDefault();
                    alert("Error: La nueva contraseña debe tener al menos 6 caracteres.");
                } else {
                    fetch(form.action, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body: new URLSearchParams(new FormData(form)).toString()
                    })
                        .then(response => {
                            if (response.ok) {
                                alert("Contraseña actualizada exitosamente.");
                                form.reset();
                            } else {
                                alert("Error al actualizar la contraseña. Por favor, inténtalo de nuevo.");
                            }
                        })
                }
            });
        });
    </script>
</body>

</html>
