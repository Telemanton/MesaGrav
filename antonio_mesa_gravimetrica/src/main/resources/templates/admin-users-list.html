<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{userListTitle}">Usuarios - Admin UJA</title>
    <link rel="stylesheet" th:href="@{/css/styles-admin.css}">
    <link rel="stylesheet" th:href="@{/css/styles-list.css}">

    <link rel="stylesheet" th:href="@{/css/jquery.dataTables.min.css}">

</head>
<body>
    <div class="container">
        <h2 th:text="#{management.users}"><i class="fas fa-users"></i> Gestión Completa de Usuarios</h2>
        
        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"
             style="margin: 20px 0; padding: 15px; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 6px;">
        </div>
        
        <table id="usersTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th th:text="#{idTable}"></th>
                    <th th:text="#{fullnameTable}"></th>
                    <th th:text="#{usernameTable}"></th>
                    <th th:text="#{emailTable}"></th>
                    <th th:text="#{roleTable}"></th>
                    <th th:text="#{dateTable}"></th>
                    <th th:text="#{actionsTable}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${allUsers}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.name + ' ' + user.surname}"></td>
                    <td><strong th:text="${user.username}"></strong></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span th:text="${user.role}" 
                              th:classappend="'role-' + ${user.role}"
                              class="badge"></span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <a th:href="@{/edit-user/{id}(id=${user.id})}" 
                           class="btn-edit" title="Editar">
                            <i class="fas fa-edit"></i> Editar
                        </a>
                        
                        <a th:href="@{/delete-user/{id}(id=${user.id})}" 
                           class="btn-delete"
                           onclick="return confirm('¿Eliminar usuario [[${user.username}]]? Esta acción no se puede deshacer.')"
                           title="Eliminar">
                            <i class="fas fa-trash"></i> Borrar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div style="margin-top: 20px;">
            <a href="/admin-home" class="btn-back">
                <i class="fas fa-arrow-left"></i> Volver al Panel
            </a>
        </div>
    </div>

    <script th:src="@{/js/jquery-3.7.0.min.js}"></script>
    <script th:src="@{/js/jquery.dataTables.min.js}"></script>

    <script type="text/javascript">
    $(document).ready(function() {
        $('#usersTable').DataTable({
            // CAMBIO 5: Traducción incrustada en local (Evita la petición al CDN)
            language: {
                processing:     "Procesando...",
                search:         "Buscar:",
                lengthMenu:    "Mostrar _MENU_ registros",
                info:           "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
                infoEmpty:      "Mostrando registros del 0 al 0 de un total de 0 registros",
                infoFiltered:   "(filtrado de un total de _MAX_ registros)",
                loadingRecords: "Cargando...",
                zeroRecords:    "No se encontraron resultados",
                emptyTable:     "Ningún dato disponible en esta tabla",
                paginate: {
                    first:      "Primero",
                    previous:   "Anterior",
                    next:       "Siguiente",
                    last:       "Último"
                }
            },
            pageLength: 25
        });
    });
    </script>
</body>
</html>
