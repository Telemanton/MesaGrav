<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{user.home}"></title>
        <link rel="stylesheet" th:href="@{/css/styles-home.css}">
         <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    </head>
    <body>
        <header>
            <div class="menu-container">
                <div class="logo">
                    <img src="https://idp.ujaen.es/autenticacion/module.php/themeujaen3/assets/logo_uja.png" alt="UJA Logo" style="filter: brightness(0) invert(1);">
                </div>
                <nav>
                    <ul>
                        <li><a href="#" th:text="#{nav.about}" onclick="window.location.href='/about'"></a></li>
                        <li class="dropdown-container">
                            <a href="#" id="userDropdown">
                                <i class="fas fa-user-circle"></i>
                                <span th:text="${currentUser.username}"></span>
                            </a>
                            <ul id="dropdownMenu" class="dropdown-content">
                                <li><a href="#" th:text="#{user.title}" onclick="window.location.href='/myprofile'"></a></li>
                                <li>
                                    <a href="#"
                                        onclick="event.preventDefault(); document.getElementById('logoutForm').submit();"
                                        th:text="#{nav.logout}"></a>
                                </li>
                            </ul>
                            <form id="logoutForm" th:action="@{/logout}"
                                method="post" style="display: none;">
                            </form>
                            </li>
                        </li>
                        
                    </ul>
                </nav>
            </div>
        </header>

        <div class="main-wrapper">
            <section class="intro">
                <h1 th:text="#{mesa.title}"></h1>
                <p th:text="#{mesa.real.time}"></p>
            </section>

            <section class="articles-grid">
                <div class="article-card">
                    <div class="icon-header">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h2 th:text="#{mesa.title}"></h2>
                    <p th:text="#{mesa.data}"></p>
                    <div class="card-footer">
                        <button class="btn-enter"
                            onclick="window.location.href='/mesa-gravimetrica'" th:text="#{btn.enter}"></button>
                    </div>
                </div>
               
            </section>

            <section class="user-panel">
                <h3><i class="fas fa-id-badge"></i> [[#{user.welcome}]]</h3>
                <div class="user-details">
                    <p th:text="#{user.user}"><strong></strong>
                        <span
                            th:text="${currentUser.name + ' ' + currentUser.surname}"></span>
                    </p>
                    <p><strong>Username:</strong>
                        <span th:text="${currentUser.username}"></span>
                    </p>
                    <p><strong>Email:</strong>
                        <span
                            th:text="${currentUser.email}">usuario@ujaen.es</span>
                    </p>
                    <p><strong>Rol:</strong>
                        <span th:text="${currentUser.role}"
                            class="role-badge"></span>
                    </p>
                    <p><strong>Fecha creación:</strong>
                        <span th:text="${currentUser.createdAt}"></span>
                    </p>
                </div>
            </section>
        </div>
        <script>
        document.getElementById('userDropdown').addEventListener('click', function(e) {
            e.preventDefault();
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('show');
        });

        window.onclick = function(event) {
            if (!event.target.closest('.dropdown-container')) {
                const menu = document.getElementById('dropdownMenu');
                if (menu.classList.contains('show')) {
                    menu.classList.remove('show');
                }
            }
        }
    </script>
    </body>
</html>
