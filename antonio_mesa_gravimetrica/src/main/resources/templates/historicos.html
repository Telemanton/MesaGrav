<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ensayos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles-mesagrav.css}">
    <style>
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .history-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            border: 2px solid transparent;
            text-align: left;
        }
        .history-card:hover {
            transform: translateY(-50px);
            border-color: #c5a059;
            background-color: #fcf9f2;
        }
        .history-card i {
            font-size: 2rem;
            color: #c5a059;
            margin-bottom: 10px;
        }
        .history-date { font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        .history-id { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-archive"></i> Historial de Registros</h1>
        <a th:href="@{/mesa-gravimetrica}" class="btn-link" style="color: white; text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Volver al Panel
        </a>
    </header>

    <div class="history-grid">
        <div th:each="reg : ${registros}" 
             class="history-card" 
             th:onclick="'window.location.href=\'/descargar/' + ${reg.id} + '\''">
            
            <i class="fas fa-file-invoice"></i>
            <span class="history-date" th:text="${#temporals.format(reg.fechaRegistro, 'dd/MM/yyyy HH:mm:ss')}">Fecha</span>
            <span class="history-id" th:text="${reg.dispositivoId}">Dispositivo</span>
            <div style="margin-top: 10px; font-size: 0.8rem; color: #aaa;">
                <i class="fas fa-fingerprint" style="font-size: 0.8rem;"></i> 
                Checksum: <span th:text="${#strings.abbreviate(reg.checksum, 15)}"></span>
            </div>
        </div>
    </div>
    
    <div th:if="${#lists.isEmpty(registros)}" style="text-align: center; margin-top: 100px; color: #888;">
        <i class="fas fa-folder-open" style="font-size: 4rem; display: block; margin-bottom: 20px;"></i>
        <p>No hay registros históricos todavía.</p>
    </div>
</div>
</body>
</html>
