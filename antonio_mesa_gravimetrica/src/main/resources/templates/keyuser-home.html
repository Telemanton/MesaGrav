<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{keyuser.title}">Panel Key User - UJA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/styles-keyuser.css}">
    
  
</head>

<body>
    <header>
        <div class="menu-container">
            <div class="logo">
                <img th:src="@{/images/logo_uja.png}" alt="UJA Logo">
            </div>
            <nav>
                <ul>
                    <li><a th:href="@{/about}" th:text="#{nav.about}"></a></li>
                    <li class="dropdown-container">
                        <a href="#" id="userDropdown">
                            <i class="fas fa-user-circle"></i>
                            <span th:text="${currentUser.username}">Usuario</span>
                        </a>
                        <ul id="dropdownMenu" class="dropdown-content">
                            <li><a th:href="@{/myprofile}" th:text="#{user.title}"></a></li>
                            <li>
                                <a href="#" onclick="submitLogout(event);" th:text="#{nav.logout}">Cerrar sesión</a>
                            </li>
                        </ul>
                        <form id="logoutForm" th:action="@{/logout}" method="post" style="display: none;">
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <section class="intro">
            <h1 th:text="#{keyuser.title}"></h1>
            <p th:text="#{keyuser.monitoring}"></p>
        </section>

        <section class="articles-grid">
            <div class="article-card">
                <div class="icon-header">
                    <i class="fas fa-layer-group"></i>
                </div>
                <h2 th:text="#{mesa.title}"></h2>
                <p th:text="#{mesa.data}"></p>
                <div class="card-footer">
                    <button class="btn-enter" th:onclick="|window.location.href='@{/mesa-gravimetrica}'|" th:text="#{btn.enter}"></button>
                </div>
            </div>

            <div class="article-card">
                <div class="icon-header">
                    <i class="fas fa-cogs"></i>
                </div>
                <h2>Torno CNC</h2>
                <p>Control de revoluciones, avance y estado de la herramienta de corte.</p>
                <div class="card-footer">
                    <button class="btn-enter" th:text="#{btn.enter}"></button>
                </div>
            </div>

            <div class="article-card">
                <div class="icon-header">
                    <i class="fas fa-users-cog"></i>
                </div>
                <h2 th:text="#{admin.users}"></h2>
                <p th:text="#{admin.create.user}"></p>
                <div class="card-footer">
                    <button class="btn-enter" th:onclick="|window.location.href='@{/create-user}'|" th:text="#{admin.create.user}"></button>
                </div>
            </div>
        </section>

        <section class="user-panel">
            <h3><i class="fas fa-id-badge"></i> [[#{keyuser.welcome}]]</h3>
            <div class="user-details">
                <p><strong>Operador:</strong> <span th:text="${currentUser.name}">Nombre Apellido</span></p>
                <p><strong>Email:</strong> <span th:text="${currentUser.email}">keyuser@ujaen.es</span></p>
                <p><strong>Rol:</strong> <span class="role-keyuser">KEY USER</span></p>
            </div>
        </section>
    </div>

    <script>
        function submitLogout(event) {
            event.preventDefault();
            const form = document.getElementById('logoutForm');
            if (form) form.submit();
        }

        const userBtn = document.getElementById('userDropdown');
        const userMenu = document.getElementById('dropdownMenu');

        if (userBtn && userMenu) {
            userBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                userMenu.classList.toggle('show');
            });
        }

        // Cierre seguro del menú al hacer clic fuera del contenedor dropdown
        window.addEventListener('click', function(event) {
            if (userMenu && !event.target.closest('.dropdown-container')) {
                userMenu.classList.remove('show');
            }
        });
    </script>
</body>
</html>
