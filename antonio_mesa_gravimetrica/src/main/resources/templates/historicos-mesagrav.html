<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ensayos</title>
    <meta th:name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta th:name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}"/>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles-historicos.css}">
</head>
<body>

<div class="modal-overlay" id="deleteModal">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-trash-alt"></i></div>
        <h2>Eliminar registro</h2>
        <p>¿Seguro que quieres eliminar este ensayo?<br><strong>Esta acción no se puede deshacer.</strong></p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-delete" id="confirmDeleteBtn">
                <i class="fas fa-trash-alt"></i> Sí, eliminar
            </button>
            <button class="modal-btn modal-btn-cancel" id="cancelDeleteBtn">
                <i class="fas fa-times"></i> Cancelar
            </button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <h1><i class="fas fa-archive"></i> Registro mesa de concentración gravimétrica</h1>
        <a th:href="@{/mesa-gravimetrica}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver al panel
        </a>
    </header>

    <div id="content-wrapper">
        <div th:if="${#lists.isEmpty(registros)}" class="table-wrap">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                No hay ensayos registrados todavía.
            </div>
        </div>

        <div th:if="${!#lists.isEmpty(registros)}" class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Fecha y hora</th>
                        <th>Dispositivo</th>
                        <th class="th-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reg, iterStat : ${registros}">
                        <td class="td-id">
                            <span class="row-num" th:text="${iterStat.count}">1</span>
                        </td>
                        <td class="td-date">
                            <i class="fas fa-calendar-alt" style="color:#c5a059;margin-right:6px;font-size:0.75rem;"></i>
                            <span th:text="${#temporals.format(reg.fechaRegistro, 'dd/MM/yyyy HH:mm:ss')}">Fecha</span>
                        </td>
                        <td class="td-device">
                            <span class="device-badge">
                                <i class="fas fa-microchip" style="font-size:0.7rem;"></i>
                                <span th:text="${reg.dispositivoId}">Dispositivo</span>
                            </span>
                        </td>
                        <td class="td-actions">
                            <button type="button" th:onclick="'descargarEnsayo(' + ${reg.id} + ')'" class="btn-action btn-download">
                                <i class="fas fa-download"></i> Descargar
                            </button>
                            <button class="btn-action btn-delete"
                                    th:data-id="${reg.id}"
                                    th:data-fecha="${#temporals.format(reg.fechaRegistro, 'dd/MM/yyyy HH:mm')}"
                                    onclick="askDelete(this)">
                                <i class="fas fa-trash-alt"></i> Borrar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let deleteTargetId = null;

    function askDelete(btn) {
        deleteTargetId = btn.getAttribute('data-id');
        document.getElementById('deleteModal').classList.add('active');
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        if (!deleteTargetId) return;
        document.getElementById('deleteModal').classList.remove('active');
        
        // 1. Extraemos dinámicamente los valores del token CSRF inyectados por Thymeleaf
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
        
        const headers = new Headers();
        // 2. Si el token existe (Spring Security está activo), se añade a la cabecera del fetch
        if (token && header) {
            headers.append(header, token);
        }

        fetch('/borrar/' + deleteTargetId, { 
            method: 'DELETE',
            headers: headers // ◄ CLAVE: Pasamos la autorización anti-hackers a Spring
        })
        .then(res => {
            if (res.ok) {
                const btn = document.querySelector('[data-id="' + deleteTargetId + '"]');
                if (btn) {
                    const row = btn.closest('tr');
                    row.style.transition = 'opacity 0.3s, transform 0.3s';
                    row.style.opacity = '0';
                    row.style.transform = 'translateX(20px)';
                    
                    setTimeout(() => {
                        row.remove();
                        const remainingRows = document.querySelectorAll('tbody tr');
                        if (remainingRows.length === 0) {
                            document.getElementById('content-wrapper').innerHTML = `
                                <div class="table-wrap">
                                    <div class="empty-state">
                                        <i class="fas fa-inbox"></i> No hay ensayos registrados todavía.
                                    </div>
                                </div>`;
                        }
                    }, 320);
                }
            } else {
                // Alerta detallada para saber exactamente por qué falla (ej: si devuelve 403, 404, etc.)
                alert('Servidor respondió con error (Código ' + res.status + '). No se pudo eliminar.');
            }
            deleteTargetId = null;
        })
        .catch(err => {
            alert('Error de conexión al intentar borrar.');
            console.error(err);
            deleteTargetId = null;
        });
    });

    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
        document.getElementById('deleteModal').classList.remove('active');
        deleteTargetId = null;
    });

    function descargarEnsayo(id) {
        fetch('/descargar/' + id)
            .then(response => {
                if (!response.ok) {
                    const mensaje = response.headers.get('X-Alerta-Mensaje') 
                        || "AVISO DE SEGURIDAD: Consulte de inmediato al administrador.";
                    alert(mensaje);
                    throw new Error("Descarga bloqueada por integridad de datos.");
                }
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ensayo_recuperado_' + id + '.csv';
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            })
            .catch(error => console.error("Proceso de descarga abortado:", error.message));
    }

    // =========================================================================
    // SCRIPT DE CAPTURA ASÍNCRONA DE TELEMETRÍA (4 Hz)
    // =========================================================================
    async function updateOtherSensors() {
        try {
            const response = await fetch('/sensor');
            if (!response.ok) return;
            
            const data = await response.json();

            // Mapeo ADXL345
            if (data.adxl) {
                const pitchEl = document.getElementById('adxl-pitch');
                const rollEl = document.getElementById('adxl-roll');
                if (pitchEl) pitchEl.innerText = data.adxl.pitch !== undefined ? Number(data.adxl.pitch).toFixed(2) : "0.00";
                if (rollEl) rollEl.innerText = data.adxl.roll !== undefined ? Number(data.adxl.roll).toFixed(2) : "0.00";
            }

            // Mapeo Frecuencia
            if (data.frecuency_sensor && document.getElementById('sensor-frecuencia')) {
                document.getElementById('sensor-frecuencia').innerText = data.frecuency_sensor.frecuency !== undefined ? Number(data.frecuency_sensor.frecuency).toFixed(2) : "0.00";
            }

            // Mapeo Velocidad Mecánica
            if (data.speed && document.getElementById('sensor-velocidad')) {
                document.getElementById('sensor-velocidad').innerText = data.speed.speedValue !== undefined ? Number(data.speed.speedValue).toFixed(2) : "0.00";
            }

            // Mapeo Gauges de Carga
            if (data.engine_gauge && document.getElementById('gauge-engine')) {
                document.getElementById('gauge-engine').innerText = data.engine_gauge.gaugeValue !== undefined ? Number(data.engine_gauge.gaugeValue).toFixed(2) : "0.00";
            }
            if (data.dropper_gauge && document.getElementById('gauge-dropper')) {
                document.getElementById('gauge-dropper').innerText = data.dropper_gauge.dropperValue !== undefined ? Number(data.dropper_gauge.dropperValue).toFixed(2) : "0.00";
            }

            // Mapeo Peso Estático
            if (data.weight && document.getElementById('sensor-peso')) {
                document.getElementById('sensor-peso').innerText = data.weight.weightValue !== undefined ? Number(data.weight.weightValue).toFixed(2) : "0.00";
            }

            // Mapeo de la red de Caudalímetros Hidráulicos (Búsqueda híbrida e inmune)
            if (data.caudales) {
                for (let i = 1; i <= 3; i++) {
                    const sensorData = data.caudales[String(i)] || data.caudales[i];
                    if (sensorData && sensorData.flowRate !== undefined && sensorData.flowRate !== null) {
                        const elementoHtml = document.getElementById(`flow-${i}`);
                        if (elementoHtml) {
                            elementoHtml.innerText = Number(sensorData.flowRate).toFixed(2);
                        }
                    }
                }
            }
        } catch (error) {
            console.error("Error fetching general sensors via REST:", error);
        }
    }

    // Intervalo de actualización cíclico continuo
    setInterval(updateOtherSensors, 250);
    window.addEventListener('DOMContentLoaded', updateOtherSensors);
</script>
</body>
</html>
