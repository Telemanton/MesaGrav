<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{create.admin.header}"></title>
    
    <link rel="stylesheet" th:href="@{/css/styles-keyuser.css}">
    <link rel="stylesheet" th:href="@{/css/styles-admin.css}">
    
 
</head> <body>
    <header class="pro-header">
        <div class="menu-container">
            <div class="logo">
                <img th:src="@{/images/logo_uja.png}" alt="UJA Logo" style="filter: brightness(0) invert(1);">
            </div>
            <nav>
                <ul>
                    <li><a href="/admin-home" style="color: white;"><i class="fas fa-arrow-left"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <section class="intro">
            <h1><i class="fas fa-user-shield"><span th:text="#{create.admin.title}"></span></i></h1>
            <p><span th:text="#{create.admin.description}"></span></p>
        </section>

        <section class="form-section">
            <form th:action="@{/save-user}" method="post" class="user-form">
                
                <input type="hidden" name="role" value="ADMIN">

                <div class="form-group">
                    <label><i class="fas fa-address-card"></i> <span th:text="#{create.admin.identity}"></span></label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" name="name" required placeholder="Nombre" style="flex: 1;">
                        <input type="text" name="surname" required placeholder="Apellidos" style="flex: 1;">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-at"></i> <span th:text="#{create.admin.email}"></span></label>
                    <input type="email" name="email" required placeholder="admin-it@ujaen.es">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-fingerprint"></i> <span th:text="#{create.admin.username}"></span></label>
                    <input type="text" name="username" required placeholder="Nombre de usuario único" minlength="3">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-key"></i> <span th:text="#{create.admin.password}"></span></label>
                    <input type="password" name="password" required minlength="8">
                    <small style="color: #666;"><span th:text="#{create.admin.password.hint}"></span></small>
                </div>

                <div class="form-actions" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                    <button type="submit" class="btn-admin">
                        <i class="fas fa-unlock-alt"></i> <span th:text="#{create.admin.submit}"></span>
                    </button>
                    <a href="/admin-home" class="btn-secondary">
                        <i class="fas fa-ban"></i> <span th:text="#{create.admin.cancel}"></span>
                    </a>
                </div>
            </form>
        </section>
    </div>

    <script>
        // Confirmation window
        document.querySelector('.user-form').addEventListener('submit', function(e) {
            if (!confirm('¿Está seguro de que quiere crear este admin?')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
