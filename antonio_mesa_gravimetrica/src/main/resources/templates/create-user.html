<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{create.user.header}"></title>
    
    <link rel="stylesheet" th:href="@{/css/styles-keyuser.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
</head>
<body>
    <header>
        <div class="menu-container">
            <div class="logo">
                <img th:src="@{/images/logo_uja.png}" alt="UJA Logo">
            </div>
            <nav>
                <ul>
                    <li><a th:href="@{/keyuser-home}"><i class="fas fa-arrow-left"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <section class="intro">
            <h1><i class="fas fa-user-plus"></i> <span th:text="#{create.user.title}"></span></h1>
            <p><span th:text="#{create.user.description}"></span></p>
        </section>

        <section class="form-section">
            <form th:action="@{/save-user}" method="post" class="user-form">

                <div class="form-group">
                    <label><i class="fas fa-user"></i> <span th:text="#{create.user.name}"></span></label>
                    <input type="text" name="name" required placeholder="Juan Pérez García" maxlength="100">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> <span th:text="#{create.user.surname}"></span></label>
                    <input type="text" name="surname" required placeholder="Pérez García" maxlength="100">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> <span th:text="#{create.user.email}"></span></label>
                    <input type="email" name="email" required placeholder="usuario@ujaen.es" maxlength="100">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i> <span th:text="#{create.user.username}"></span></label>
                    <input type="text" name="username" required placeholder="juanperez" maxlength="50" minlength="3">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> <span th:text="#{create.user.password}"></span></label>
                    <input type="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-users-cog"></i> <span th:text="#{create.user.role}"></span></label>
                    <select name="role" required class="form-select">
                        <option value="" th:text="#{create.user.role.placeholder}"></option>
                        <option value="USER" th:text="#{create.user.role.user}"></option>
                        <option value="KEYUSER" th:text="#{create.user.role.keyuser}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> <span th:text="#{create.user.submit}"></span>
                    </button>
                    <a th:href="@{/cancel}" class="btn-secondary">
                        <i class="fas fa-times"></i> <span th:text="#{create.user.cancel}"></span>
                    </a>
                </div>
            </form>
        </section>
    </div>

    <script>
        // Confirmation dialog before submitting the form
        document.querySelector('.user-form').addEventListener('submit', function(e) {
            if (!confirm('¿Crear este usuario?')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
