<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="robots" content="noindex, nofollow">
    
    <title th:text="#{login.title}">Acceso - UJA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <link rel="shortcut icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
    

<body>
    <div id="layout">
        <header id="header">
            <div class="wrap v-center">
                <div id="logo">
                    <img th:src="@{/images/logo_uja.png}" alt="Universidad de Jaén">
                </div>

                <div class="language-selection">
                    <form class="pure-form">
                        <select aria-label="Language" id="language-selector">
                            <option value="es" th:selected="${#locale.language == 'es'}">🌐 Español</option>
                            <option value="en" th:selected="${#locale.language == 'en'}">🌐 English</option>
                        </select>
                    </form>
                </div>
            </div>
        </header>

        <main>
            <div id="content">
                <div class="wrap">
                    <div id="flex-container-login">
                        <div class="siduja-box login-card">
                            <img class="siduja_logo" th:src="@{/images/sesion.png}" alt="SIDUJA">
                            
                            <form id="login-form" class="pure-form pure-form-aligned" th:action="@{/user-logging}" method="POST" name="login-form">
                                <input type="hidden" name="authsource">
                                
                                <div class="pure-control-group">
                                    <label id="label-user" for="username" th:text="#{login.username}">Usuario</label>
                                    <input id="username" type="text" name="username" required>
                                </div>

                                <div class="pure-control-group">
                                    <label id="label-pass" for="password" th:text="#{login.password}">Contraseña</label>
                                    <input id="password" type="password" name="password" required>
                                </div>

                                <div class="pure-controls">
                                    <button type="submit" id="btn-login" class="pure-button pure-button-primary" th:text="#{login.button}">Acceder</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="full-width-info">
                    <div class="wrap">
                        <h6 id="info-title" th:text="#{login.welcome}">Bienvenidos</h6>
                        <p id="info-p1" th:text="#{login.description1}"></p>
                        <p id="info-p2" th:text="#{login.description2}"></p>
                    </div>
                </div>

                <footer class="footer-info">
                    <div class="wrap">
                        <p><strong th:text="#{login.contact}">Contacto</strong></p>
                        <p th:text="#{login.address}">Carretera de Madrid, s/n 23071 Jaén</p>
                        <p th:text="#{login.phone}"></p>
                        <p><span th:text="#{login.email}">Email</span>: <a href="mailto:explotacionminas@ujaen.es">explotacionminas@ujaen.es</a></p>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('language-selector').addEventListener('change', (e) => {
            const lang = e.target.value;
            const url = new URL(window.location.href);
            
            // Setea el parámetro de idioma esperado por Spring Security / MVC 'LocaleChangeInterceptor'
            url.searchParams.set('lang', lang);
            
            // Redirige reemplazando el historial para conservar el comportamiento del botón "Atrás"
            window.location.replace(url.toString());
        });
    </script>
</body>
</html>
