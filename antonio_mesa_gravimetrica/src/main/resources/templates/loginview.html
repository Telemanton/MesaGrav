<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="robots" content="noindex, nofollow">
    
    <title th:text="#{login.title}"></title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" href="https://idp.ujaen.es/autenticacion/module.php/themeujaen3/assets/favicon.ico?tag=06950">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="layout">
        <header id="header">
            <div class="wrap v-center">
                <div id="logo">
                    <img src="https://idp.ujaen.es/autenticacion/module.php/themeujaen3/assets/logo_uja.png?tag=06950" alt="Universidad de Jaén">
                </div>

                <div class="language-selection">
                    <form class="pure-form">
                        <select aria-label="Language" id="language-selector">
                            <option value="es" th:selected="${#locale.language == 'es'}">🌐 Español</option>
                            <option value="en" th:selected="${#locale.language == 'en'}">🌐 English</option>
                        </select>
                    </form>
                </div>
            </div>
        </header>

        <main>
            <div id="content">
                <div class="wrap">
                    <div id="flex-container-login">
                        <div class="siduja-box login-card">
                            <img class="siduja_logo" src="https://idp.ujaen.es/autenticacion/module.php/themeujaen3/assets/logo_siduja.png?tag=06950" alt="SIDUJA">
                            
                            <form id="login-form" class="pure-form pure-form-aligned" action="user-logging" method="POST" name="login-form">
                                <input type="hidden" name="authsource">
                                
                                <div class="pure-control-group">
                                    <label id="label-user" for="username" th:text="#{login.username}"></label>
                                    <input id="username" type="text" name="username" required>
                                </div>

                                <div class="pure-control-group">
                                    <label id="label-pass" for="password" th:text="#{login.password}"></label>
                                    <input id="password" type="password" name="password" required>
                                </div>

                                <div class="pure-controls">
                                    <button type="submit" id="btn-login" class="pure-button pure-button-primary" th:text="#{login.button}">Acceder</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="full-width-info">
                    <div class="wrap">
                        <h6 id="info-title" th:text="#{login.welcome}"></h6>
                        <p id="info-p1" th:text="#{login.description1}"></p>
                        <p id="info-p2" th:text="#{login.description2}"></p>
                    </div>
                </div>

                <footer class="footer-info">
                    <div class="wrap">
                        <p><strong th:text="#{login.contact}"></strong></p>
                        <p th:text="#{login.address}">Carretera de Madrid, s/n 23071 Jaén</p>
                        <p th:text="#{login.phone}"></p>
                        <p><span th:text="#{login.email}"></span>: <a href="mailto:explotacionminas@ujaen.es">explotacionminas@ujaen.es</a></p>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const selector = document.getElementById('language-selector');
        
        selector.addEventListener('change', (e) => {
            const lang = e.target.value;
            // Use fetch to change language via AJAX without creating new history entry
            fetch('?lang=' + lang, {
                method: 'GET',
                credentials: 'same-origin'
            })
            .then(response => {
                // Replace current history entry instead of creating a new one
                // This way when user clicks back, they go to previous page (not previous language)
                const url = new URL(window.location);
                url.searchParams.set('lang', lang);
                window.history.replaceState({lang: lang}, '', url.toString());
                
                // Reload page to apply new language
                window.location.reload();
            })
            .catch(error => console.error('Error changing language:', error));
        });
    </script>
</body>
</html>
