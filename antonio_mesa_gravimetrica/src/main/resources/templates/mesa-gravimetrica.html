<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Mesa Gravimétrica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles-mesagrav.css}">
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1><i class="fas fa-microchip"></i> Telemetría en Tiempo Real</h1>
        </div>
        <div class="user-info">
            <span th:text="${currentUser.name + ' ' + currentUser.surname}">Usuario</span>
            <form th:action="@{/logout}" method="post" style="display:inline; margin-left:15px;">
                <button type="submit" class="btn-link" style="background:none; border:none; color:var(--danger); cursor:pointer;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </form>
        </div>
    </header>

    <div class="main-grid">
        <div class="col-left">
            <div class="sensor-card">
                <div class="card-header"><i class="fas fa-compass"></i> ADXL345 - Orientación</div>
                <div class="data-row">
                    <div class="data-item"><span id="val-pitch" class="data-value">0.0</span><span class="data-label">Pitch</span></div>
                    <div class="data-item"><span id="val-roll" class="data-value">0.0</span><span class="data-label">Roll</span></div>
                </div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <div class="data-row">
                    <div class="data-item"><span id="val-x" class="data-value">0.0</span><span class="data-label">X</span></div>
                    <div class="data-item"><span id="val-y" class="data-value">0.0</span><span class="data-label">Y</span></div>
                    <div class="data-item"><span id="val-z" class="data-value">0.0</span><span class="data-label">Z</span></div>
                </div>
            </div>

            <div class="sensor-card">
                <div class="card-header"><i class="fas fa-wave-square"></i> Análisis Vibración</div>
                <div style="text-align: center;">
                    <span id="val-freq" style="font-size: 3rem; font-weight: 800; color: var(--uja-gold);">0.0</span>
                    <span style="font-size: 1.2rem; color: #888;">Hz</span>
                </div>
            </div>

            <div class="recording-panel">
                <h3><i class="fas fa-file-csv"></i> Adquisición de Datos</h3>
                <button id="btnStart" onclick="startRecording()" class="btn btn-start">
                    <i class="fas fa-play"></i> Grabar Ensayo
                </button>
                <button id="btnStop" onclick="stopRecording()" class="btn btn-stop" disabled>
                    <i class="fas fa-download"></i> Parar y Descargar
                </button>
                <div id="recordStatus" class="status-rec">
                    <i class="fas fa-circle blink"></i> GRABANDO DATOS...
                </div>
            </div>
        </div>

        <div class="col-right">
            <div class="sensor-card">
                <div class="card-header"><i class="fas fa-tint"></i> Red de Caudalímetros (L/min)</div>
                <div class="flow-grid">
                    <div th:each="i : ${#numbers.sequence(1, 12)}" class="mini-card">
                        <span class="mini-id">Sensor <span th:text="${i}"></span></span>
                        <span th:id="'flow-' + ${i}" class="mini-value">0.00</span>
                        <span class="mini-unit">L/min</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Actualización Automática cada segundo
    async function updateDashboard() {
        try {
            const response = await fetch('/sensor');
            const data = await response.json();

            // Mapear ADXL
            if (data.adxl) {
                document.getElementById('val-x').innerText = data.adxl.x.toFixed(2);
                document.getElementById('val-y').innerText = data.adxl.y.toFixed(2);
                document.getElementById('val-z').innerText = data.adxl.z.toFixed(2);
                document.getElementById('val-pitch').innerText = data.adxl.pitch.toFixed(1) + '°';
                document.getElementById('val-roll').innerText = data.adxl.roll.toFixed(1) + '°';
            }

            // Mapear Frecuencia
            if (data.frecuencia) {
                document.getElementById('val-freq').innerText = data.frecuencia.frecuencia.toFixed(2);
            }

            // Mapear 12 Caudales
            if (data.caudales) {
                for (let i = 1; i <= 12; i++) {
                    const sensor = data.caudales[i];
                    const element = document.getElementById('flow-' + i);
                    if (element) {
                        element.innerText = sensor ? sensor.flowRate.toFixed(2) : "0.00";
                    }
                }
            }
        } catch (error) {
            console.error("Error al obtener datos:", error);
        }
    }

    // 2. Control de Grabación (DataExportController)
    function startRecording() {
        fetch('/export/start', { method: 'POST' })
            .then(res => {
                if (res.ok) {
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnStop').disabled = false;
                    document.getElementById('recordStatus').style.display = 'block';
                }
            });
    }

    function stopRecording() {
        // Redirigir al endpoint de descarga
        window.location.href = '/export/download';

        // Resetear botones tras un pequeño delay
        setTimeout(() => {
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('recordStatus').style.display = 'none';
        }, 1500);
    }

    // Iniciar bucle de refresco
    setInterval(updateDashboard, 1000);
</script>

</body>
</html>
