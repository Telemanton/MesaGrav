<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{editar.usuario.title}">Editar Usuario - UJA Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles-keyuser.css}">
    
    
</head>
<body>
    <header>
        <div class="menu-container">
            <div class="logo">
                <img th:src="@{/images/logo_uja.png}" alt="UJA Logo">
            </div>
            <nav>
                <ul>
                    <li><a th:href="@{/admin-users}" th:text="#{btn.back}"></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <section class="intro">
            <h1><i class="fas fa-user-edit"></i> <span th:text="#{editar.usuario.editar.usuario}">Editar Usuario</span></h1>
            <p th:text="#{editar.modif}">Modifique los datos del usuario seleccionado.</p>
        </section>

        <section class="form-section">
            <form th:action="@{/update-user}" th:object="${userForm}" method="post" class="user-form">
                
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i> Nombre de Usuario (No editable)</label>
                    <input type="text" th:field="*{username}" readonly class="readonly-input" 
                           style="background-color: #f4f4f4; cursor: not-allowed;" />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> <span th:text="#{edit.user.namee}">Nombre</span></label>
                    <input type="text" th:field="*{name}" required placeholder="Nombre" maxlength="100">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> <span th:text="#{edit.user.surnamee}">Apellidos</span></label>
                    <input type="text" th:field="*{surname}" required placeholder="Apellidos" maxlength="100">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> <span th:text="#{edit.user.emaill}">Email</span></label>
                    <input type="email" th:field="*{email}" required placeholder="usuario@ujaen.es" maxlength="100">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-users-cog"></i> <span th:text="#{edit.user.roll}">Rol del Sistema</span></label>
                    <select th:field="*{role}" required class="form-select">
                        <option value="USER" th:text="#{usuario.standard}">Usuario Normal (USER)</option>
                        <option value="KEYUSER" th:text="#{keyuser.standard}">Key User</option>
                        <option value="ADMIN" th:text="#{admin.standard}">Administrador</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> <span th:text="#{usuario.save.changes}">Guardar Cambios</span>
                    </button>
                    <a th:href="@{/admin-users}" class="btn-secondary">
                        <i class="fas fa-times"></i> <span th:text="#{usuario.cancel}">Cancelar</span>
                    </a>
                </div>
            </form>
        </section>
    </div>

    <script>
        // Confirmación antes de actualizar
        document.querySelector('.user-form').addEventListener('submit', function(e) {
            if (!confirm('¿Desea guardar los cambios realizados en este usuario?')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
